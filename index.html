<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vireo</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>

    <div class="main-container">
        <section class="card">
            <h1 class="app-title">Vireo</h1>
            <div class="activity-scroll-container" id="activityTiles"></div>
            <div id="display">00:00:00</div>
            <button id="startStopBtn">Start</button>
            <span class="manual-link" onclick="addManualTime()">+ Forgot to start? Add time manually</span>
        </section>

        <section class="card">
            <div class="header-row">
                <h2>Overview</h2>
                <div class="controls">
                    <button onclick="updateChart('day')">D</button>
                    <button onclick="updateChart('week')">W</button>
                    <button onclick="updateChart('month')">M</button>
                    <button onclick="updateChart('year')">Y</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="timeChart"></canvas>
            </div>
            <div id="goalContainer" style="margin-top: 20px;">
                </div>
        </section>

        <section class="card">
            <h3>Manage Activities</h3>
            <div class="add-column">
                <input type="text" id="newActivityName" placeholder="Activity Name">
                <div class="add-row">
                    <input type="color" id="newActivityColor" value="#4CAF50">
                    <input type="number" id="newActivityGoal" placeholder="Daily Goal (h)" step="0.5">
                    <button onclick="addActivity()">Add</button>
                </div>
            </div>
            <ul id="activityList"></ul>
        </section>

        <section class="card">
            <h3>Recent History</h3>
            <div id="historyLog" class="history-list"></div>
            <hr>
            <button class="danger-btn" onclick="clearAllData()">Reset Everything</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
